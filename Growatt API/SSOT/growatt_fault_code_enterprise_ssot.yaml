spec_version: 1.0.0
title: Growatt Fault Code Enterprise SSOT
vendor: Growatt
source_workbook: Growatt Error&Protect&Warning Code V000.029_External_English.xlsx
scope: External English fault / protect / warning code publication for enterprise integration
last_generated_from_source: '2026-03-16'
design_principles:
- Single source of truth for external-facing fault metadata
- Stable machine-readable schema for cloud, VPP, API, portal, and AI assistant integration
- Preserve original workbook wording while adding enterprise normalization fields
- Separate device raw semantics from platform default actions
schema:
  record_key: severity + code (+ optional code_range_end)
  fields:
    id: Stable record id
    severity: error | protect | warning
    severity_rank: 3=error, 2=protect, 1=warning
    family: Original code family prefix
    code: Numeric start code
    code_range_end: Optional range end for reserved blocks
    code_text: Original external code text
    category: Normalized external category
    category_key: Machine-friendly category key
    sub_code: Original external sub-code text
    lcd_display: Customer-visible LCD display text
    inverter_state: Original inverter state from source
    fault_description: External description
    troubleshooting_steps: Normalized list of external troubleshooting steps
    reserved: Whether record is a reserved code/range placeholder
    auto_recover_default: Default platform assumption
    affects_dispatch_default: Default enterprise/VPP dispatch impact assumption
    recommended_vpp_action: Default enterprise action recommendation
    external_visibility: Publication scope
    source: Workbook traceability
enums:
  severity:
  - error
  - protect
  - warning
  external_visibility:
  - public_external
  recommended_vpp_action_examples:
  - block_dispatch
  - pause_dispatch
  - raise_alarm
  - notify_operator
  - require_manual_check
  - allow_auto_recover_check
  - log_only
  - monitor_trend
governance:
  owner: Product / Device Platform
  consumers:
  - OpenAPI
  - VPP mapping
  - Portal UI
  - Service tooling
  - AI ops assistant
  change_rules:
  - Do not change code_text or fault_description without source workbook review
  - Enterprise action defaults can be tuned per market or partner profile
  - New battery-specific records should replace reserved ranges with explicit codes
summary:
  total_records: 180
  by_severity:
    error: 94
    protect: 85
    warning: 1
  by_category:
    PV side: 26
    AC side: 28
    Inside the system: 61
    Battery side: 27
    Off-grid side: 21
    Backup box: 9
    ANTI PID-X: 8
  reserved_records: 3
