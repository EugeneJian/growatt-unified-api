- id: protect_412
  severity: protect
  severity_rank: 2
  family: protect
  code: 412
  code_range_end: null
  code_text: Protect 412
  category: Inside the system
  category_key: inside_the_system
  sub_code: '1. Phase lock failed

    2. Grid voltage exceeds the grid-connection startup voltage upper threshold

    3. Grid frequency exceeds the grid-connection startup frequency upper threshold

    4. PV voltage excessively low or excessively high

    5. Bus soft start failed or bus voltage low

    6. BAT voltage is lower than the set EOD point

    7. BUS voltage is not calibrated

    8. The BMS status is in initialization, shutdown, failure or upgrade status.

    9. Abnormal off-grid parameter settings

    10. M3-DSP serial port protocol version does not match

    11. Phase sequence check not completed

    12. Frequency range check not completed

    13. DSP receives incomplete M3 data frame

    14. Anormal inverer voltage

    15. Only auxiliary switch closed, main switch is not closed.（Reserved)

    16. Load side oil engine starts, inverter stops outputting

    17..BUS voltage excessively high

    18. PvToBat does not control

    21. ATS blocking alarm'
  lcd_display: Protect412
  inverter_state: Protect/On
  fault_description: Startup requirements for grid connection are not met
  troubleshooting_steps:
  - Check if the grid voltage is within the specified range and check if the grid-connection startup voltage configuration
    is correct.
  - Check if the PV voltage is within the specified range.
  - Check battery voltage and BMS low-voltage setpoint;
  - Check if the battery BMS status is ready;
  - Check off-grid parameter settings;
  - Check if M3 and DSP versions are correct;
  - Perform corresponding checks on each sub-code information; if it is sub-code 15, operate the switch according to the instruction
    manual.
  - Restart the inverter. If the error message persists, contact Growatt support.
  external_visibility: public_external
  source:
